<!DOCTYPE html>
<html>
<head>

<title>Construction Expense Tracker</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>


<header>
<h1>🏗 Construction Expense Tracker</h1>
<p>Building Project Management System</p>
</header>



<div class="container">


<div class="cards">

<div class="card">
<h3>Total Budget</h3>
<h2 id="budget">₹0</h2>
</div>


<div class="card">
<h3>Total Expense</h3>
<h2 id="total">₹0</h2>
</div>


<div class="card">
<h3>Remaining</h3>
<h2 id="remain"></h2>
</div>


</div>



<div class="form">

<h2>Add Expense</h2>

<input type="date" id="date">

<select id="category">
<option>Material</option>
<option>Labour</option>
<option>Equipment</option>
<option>Transport</option>
<option>Other</option>
</select>


<input id="desc" placeholder="Description">


<input type="number" id="amount" placeholder="Amount">


<button onclick="addExpense()">Add</button>


</div>



<table>

<thead>

<tr>
<th>Date</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
</tr>

</thead>


<tbody id="list"></tbody>


</table>


</div>


<script src="js/script.js"></script>

</body>
</html>
