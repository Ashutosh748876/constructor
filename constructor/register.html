<!DOCTYPE html>
<html>

<head>

<title>Create Account</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="login-box">


<h1>Create Account</h1>


<input id="name"
placeholder="Name">


<input id="email"
placeholder="Email">


<input id="password"
type="password"
placeholder="Password">


<input id="budget"
type="number"
placeholder="Project Budget">


<button onclick="register()">
Register
</button>


</div>



<script src="js/auth.js"></script>


</body>

</html>
